version: "3.9"

services:
  # ============================================================
  # MariaDB Database
  # ============================================================
  db:
    image: mariadb:11.2
    container_name: lapor_id_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: lapor_id
      MYSQL_USER: lapor_user
      MYSQL_PASSWORD: lapor_password
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - lapor_network
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      start_period: 30s
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================
  # Next.js Application
  # ============================================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lapor_id_app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # Database
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: lapor_user
      DB_PASSWORD: lapor_password
      DB_NAME: lapor_id
      # Session
      SESSION_SECRET: lapor-id-super-secret-session-key-change-in-production-2024
      # App
      NODE_ENV: production
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    depends_on:
      db:
        condition: service_healthy
    networks:
      - lapor_network

# ============================================================
# Volumes & Networks
# ============================================================
volumes:
  db_data:
    driver: local

networks:
  lapor_network:
    driver: bridge
