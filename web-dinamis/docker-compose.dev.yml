version: "3.9"

# ============================================================
# docker-compose.dev.yml
# Untuk development dengan hot reload
# Jalankan: docker compose -f docker-compose.dev.yml up
# ============================================================

services:
  db:
    image: mariadb:11.2
    container_name: lapor_id_db_dev
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: lapor_id
      MYSQL_USER: lapor_user
      MYSQL_PASSWORD: lapor_password
    ports:
      - "3306:3306"
    volumes:
      - db_dev_data:/var/lib/mysql
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - lapor_dev_network
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      start_period: 30s
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    image: node:20-alpine
    container_name: lapor_id_app_dev
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules     # Exclude node_modules dari bind mount
      - /app/.next            # Exclude .next cache
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: lapor_user
      DB_PASSWORD: lapor_password
      DB_NAME: lapor_id
      SESSION_SECRET: dev-secret-key-not-for-production-use-only
      NODE_ENV: development
      WATCHPACK_POLLING: "true"   # Hot reload di Docker
    depends_on:
      db:
        condition: service_healthy
    networks:
      - lapor_dev_network

volumes:
  db_dev_data:
    driver: local

networks:
  lapor_dev_network:
    driver: bridge
