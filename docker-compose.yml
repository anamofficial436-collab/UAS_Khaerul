version: '3.8'

services:
  mariadb:
    image: mariadb:10.11
    container_name: mariadb_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: lapor_id
      MYSQL_USER: lapor_user
      MYSQL_PASSWORD: lapor_password
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql

  web-statis:
    image: ${DOCKER_USERNAME}/web-statis:latest
    container_name: app_web_statis
    restart: always
    ports:
      - "80:80"

  web-dinamis:
    image: ${DOCKER_USERNAME}/web-dinamis:latest
    container_name: app_web_dinamis
    restart: always
    ports:
      - "3000:3000"
    environment:
      DB_HOST: mariadb
      DB_PORT: 3306
      DB_USER: lapor_user
      DB_PASSWORD: lapor_password
      DB_NAME: lapor_id
      SESSION_SECRET: ci-build-secret-not-for-production
    depends_on:
      - mariadb

volumes:
  mariadb_data: