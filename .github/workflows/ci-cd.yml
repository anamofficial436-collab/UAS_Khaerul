name: CI/CD — UAS Administrasi Server (Optimized)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

env:
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}

jobs:
  # ══════════════════════════════════════════════════════════
  # JOB 1: Detect Changes (Paths Filter)
  # ══════════════════════════════════════════════════════════
  detect-changes:
    name: Detect Changed Paths
    runs-on: ubuntu-latest
    outputs:
      web-statis: ${{ steps.filter.outputs.web-statis }}
      web-dinamis: ${{ steps.filter.outputs.web-dinamis }}
      deploy-config: ${{ steps.filter.outputs.deploy-config }}
    steps:
      - uses: actions/checkout@v4

      - name: Check changed paths
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            web-statis:
              - 'web-statis/**'
            web-dinamis:
              - 'web-dinamis/**'
            deploy-config:
              - 'docker-compose.yml'
              - '.env.example'

  # ══════════════════════════════════════════════════════════
  # JOB 2: Build & Push — Web Statis
  # ══════════════════════════════════════════════════════════
  build-web-statis:
    name: Build Web Statis
    runs-on: ubuntu-latest
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.web-statis == 'true' || github.event_name == 'workflow_dispatch' || needs.detect-changes.outputs.deploy-config == 'true' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push web-statis image
        uses: docker/build-push-action@v5
        with:
          context: ./web-statis
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/web-statis:latest
            ${{ secrets.DOCKER_USERNAME }}/web-statis:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ══════════════════════════════════════════════════════════
  # JOB 3: Build & Push — Web Dinamis (Optimized)
  # ══════════════════════════════════════════════════════════
  build-web-dinamis:
    name: Build Web Dinamis
    runs-on: ubuntu-latest
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.web-dinamis == 'true' || github.event_name == 'workflow_dispatch' || needs.detect-changes.outputs.deploy-config == 'true' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Mengandalkan Docker Buildx sepenuhnya untuk build & caching (Lebih cepat dan clean)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push web-dinamis image
        uses: docker/build-push-action@v5
        with:
          context: ./web-web-dinamis
          file: ./web-dinamis/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/web-dinamis:latest
            ${{ secrets.DOCKER_USERNAME }}/web-dinamis:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ══════════════════════════════════════════════════════════
  # JOB 4: Deploy ke EC2 (Lebih Aman & Kebal False-Trigger)
  # ══════════════════════════════════════════════════════════
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: [detect-changes, build-web-statis, build-web-dinamis]
    # Memastikan deploy HANYA jalan jika ada perubahan nyata atau dipicu manual, dan build tidak ada yang gagal
    if: |
      always() &&
      (needs.detect-changes.outputs.web-statis == 'true' || needs.detect-changes.outputs.web-dinamis == 'true' || needs.detect-changes.outputs.deploy-config == 'true' || github.event_name == 'workflow_dispatch') &&
      (needs.build-web-statis.result == 'success' || needs.build-web-statis.result == 'skipped') &&
      (needs.build-web-dinamis.result == 'success' || needs.build-web-dinamis.result == 'skipped')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy docker-compose to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.yml,.env.example"
          target: "/home/ubuntu/uas/"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd /home/ubuntu/uas

            echo "🔐 Login ke Docker Hub..."
            echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

            echo "🚀 Sinkronisasi Environment (.env)..."
            if [ ! -f .env ]; then
              cp .env.example .env
            fi
            # Menggunakan pelindung '|| true' jika key belum terdaftar di .env.example
            sed -i "s|DOCKER_USERNAME=.*|DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}|" .env || echo "DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}" >> .env

            echo "📥 Menarik Image Terbaru..."
            docker compose pull

            echo "🛑 Menghentikan kontainer lama yang berpotensi bentrok..."
            # Menghapus kontainer berdasarkan nama service compose (jauh lebih aman dibanding hardcoded ID acak)
            docker compose down --remove-orphans || true
            sudo docker rm -f app_web_dinamis app_web_statis 2>/dev/null || true

            echo "⚡ Menyalakan Layanan Microservices Baru..."
            docker compose up -d

            echo "🧹 Pembersihan Image Gantung (Dangling Images)..."
            docker image prune -f

            echo "✅ SELESAI! Kontainer Berhasil Dideploy."
            docker compose ps